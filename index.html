<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>ロボカル｜製造業特化・即戦力エンジニア人材紹介／機械設計・制御設計・生産技術・SV</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --primary: #0EA5E9;
    --primary-dark: #0284C7;
    --primary-darker: #0369A1;
    --primary-light: #7DD3FC;
    --primary-pale: #E0F2FE;
    --primary-ghost: #F0F9FF;
    --text-dark: #0F172A;
    --text: #334155;
    --text-muted: #64748B;
    --border: #E2E8F0;
    --soft: #E2E8F0;
    --bg-soft: #F8FAFC;
  }
  html { scroll-behavior: smooth; scroll-padding-top: 96px; }
  section[id] { scroll-margin-top: 96px; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    background: #ffffff;
    font-size: 19px;
    line-height: 2.0;
    font-feature-settings: "palt" 1;
    min-width: 1280px;
  }
  .font-display { letter-spacing: 0.005em; }

  /* ===== Typography (Round 4: breathing room for Japanese) ===== */
  /* ===== Japanese text-break safety (prevent mid-word breaks) ===== */
  h1, h2, h3, h4,
  .h1-hero, .h2-section, .h3-card, .h4-sub,
  .case-card .case-title,
  .engineer-card .eng-role,
  .flow-step h3, .flow-step h4,
  .stat-label, .stat-unit {
    word-break: keep-all;
    line-break: strict;
    overflow-wrap: break-word;
  }
  .h1-hero {
    font-weight: 900;
    font-size: clamp(34px, 5.2vw, 62px);
    line-height: 1.34;
    letter-spacing: -0.01em;
    color: var(--text-dark);
  }
  .h1-hero .h1-line {
    display: block;
    margin-bottom: 0.12em;
  }
  .h1-hero .h1-line:last-child { margin-bottom: 0; }
  .h1-hero .h1-accent {
    color: var(--primary-dark);
    padding-right: 0.04em;
  }
  .h2-section {
    font-weight: 900;
    font-size: clamp(26px, 3.4vw, 42px);
    line-height: 1.55;
    letter-spacing: -0.005em;
    color: var(--text-dark);
    text-align: center;
  }
  .h3-card {
    font-weight: 800;
    font-size: clamp(22px, 2vw, 28px);
    line-height: 1.55;
    color: var(--text-dark);
  }
  .h4-sub {
    font-weight: 800;
    font-size: clamp(18px, 1.5vw, 20px);
    color: var(--text-dark);
  }
  .num-price-xl {
    font-weight: 900;
    font-size: clamp(96px, 13vw, 160px);
    line-height: 0.95;
    color: var(--primary-dark);
    letter-spacing: -0.04em;
  }
  .num-price {
    font-weight: 900;
    font-size: clamp(72px, 9vw, 112px);
    line-height: 1;
    color: var(--primary-dark);
    letter-spacing: -0.03em;
  }
  .num-xl {
    font-weight: 900;
    font-size: clamp(34px, 3.6vw, 50px);
    line-height: 1;
    color: var(--primary-dark);
    letter-spacing: -0.02em;
    display: block;
  }
  .stat-unit {
    display: block;
    font-size: clamp(13px, 1.3vw, 18px);
    font-weight: 900;
    color: var(--text-dark);
    margin-top: 6px;
    letter-spacing: 0.05em;
  }
  .body-text {
    font-weight: 500;
    font-size: 19px;
    line-height: 2.05;
    color: var(--text);
  }
  .lead-strong {
    font-weight: 700;
    font-size: 22px;
    line-height: 1.95;
    color: var(--text-dark);
  }
  .tagline {
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 0.14em;
    color: var(--primary-dark);
  }
  /* PC専用レイアウト - モバイル対応なし */

  /* ===== Colors ===== */
  .bg-primary { background-color: var(--primary); }
  .bg-primary-dark { background-color: var(--primary-dark); }
  .bg-pale { background-color: var(--primary-pale); }
  .bg-ghost { background-color: var(--primary-ghost); }
  .bg-soft { background-color: var(--bg-soft); }
  .text-primary { color: var(--primary); }
  .text-primary-dark { color: var(--primary-dark); }
  .text-primary-darker { color: var(--primary-darker); }
  .text-dark { color: var(--text-dark); }
  .text-muted { color: var(--text-muted); }
  .border-soft { border-color: var(--border); }

  /* ===== Buttons (Round 3: even bigger) ===== */
  .btn-primary {
    background: var(--primary);
    color: white;
    font-weight: 900;
    font-size: 18px;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 20px 36px;
    border-radius: 16px;
    box-shadow: 0 12px 24px -10px rgba(14,165,233,0.4);
    white-space: nowrap;
  }
  .btn-primary:hover {
    background: var(--primary-dark);
    transform: translateY(-2px);
    box-shadow: 0 20px 36px -14px rgba(14,165,233,0.6);
  }
  .btn-secondary {
    background: white;
    color: var(--primary-dark);
    border: 3px solid var(--primary);
    font-weight: 900;
    font-size: 18px;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 18px 32px;
    border-radius: 16px;
    white-space: nowrap;
  }
  .btn-secondary:hover {
    background: var(--primary-ghost);
  }
  .btn-mini {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 26px;
    border-radius: 12px;
    font-weight: 800;
    font-size: 15px;
  }

  /* ===== Hero ===== */
  .hero-bg {
    background: linear-gradient(160deg, #ffffff 0%, #F0F9FF 55%, #E0F2FE 100%);
    position: relative;
    overflow: hidden;
  }
  .hero-bg::before {
    content: "";
    position: absolute;
    top: -30%;
    right: -10%;
    width: 60%;
    height: 160%;
    background: radial-gradient(circle, rgba(14,165,233,0.14) 0%, transparent 60%);
    pointer-events: none;
  }
  .hero-bg::after {
    content: "";
    position: absolute;
    bottom: -40%;
    left: -20%;
    width: 70%;
    height: 140%;
    background: radial-gradient(circle, rgba(125,211,252,0.18) 0%, transparent 60%);
    pointer-events: none;
  }

  /* ===== Cards ===== */
  .card-shadow { box-shadow: 0 10px 30px -14px rgba(14,165,233,0.18); }

  /* ===== Trust bar ===== */
  .trust-bar {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 14px;
    font-weight: 800;
    color: var(--text-dark);
    box-shadow: 0 8px 20px -10px rgba(14,165,233,0.2);
  }
  .trust-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--primary);
    box-shadow: 0 0 0 4px var(--primary-pale);
  }

  /* ===== FV stat block ===== */
  .stat-block {
    background: white;
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 24px 16px;
    text-align: center;
    min-height: 170px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    transition: all 0.2s;
  }
  .stat-block:hover {
    border-color: var(--primary-light);
    transform: translateY(-2px);
  }
  .stat-label {
    font-size: 13px;
    font-weight: 900;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    margin-bottom: 12px;
    white-space: nowrap;
  }
  /* stat-unit now defined above in responsive block */

  /* ===== Service structure ===== */
  .struct-step {
    background: white;
    border: 2px solid var(--border);
    border-radius: 24px;
    padding: 36px 20px;
    text-align: center;
    position: relative;
    transition: all 0.2s;
    min-width: 0;
  }
  .struct-step:hover {
    border-color: var(--primary);
    transform: translateY(-3px);
  }
  .struct-num {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--primary);
    color: white;
    font-weight: 900;
    font-size: 14px;
    padding: 6px 18px;
    border-radius: 999px;
    letter-spacing: 0.1em;
    white-space: nowrap;
  }
  .struct-icon {
    width: 88px;
    height: 88px;
    border-radius: 22px;
    background: var(--primary-pale);
    color: var(--primary-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 16px auto 20px;
  }
  .struct-arrow {
    display: none;
    color: var(--primary);
  }
  @media (min-width: 1024px) {
    .struct-arrow { display: flex; align-items: center; justify-content: center; }
  }

  /* ===== Job chip ===== */
  .job-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 8px;
    padding: 16px 6px 14px;
    border-radius: 14px;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    transition: all 0.2s;
    min-height: 108px;
  }
  .job-chip:hover { border-color: var(--primary-light); background: white; }
  .job-chip-icon {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 10px;
    background: var(--primary-pale);
    color: var(--primary-dark);
    flex-shrink: 0;
  }
  .job-chip-label {
    font-size: 12px;
    font-weight: 800;
    color: var(--text-dark);
    text-align: center;
    line-height: 1.35;
    word-break: keep-all;
    line-break: strict;
    overflow-wrap: break-word;
    letter-spacing: -0.01em;
  }
  @media (min-width: 640px) {
    .job-chip-label { font-size: 13px; }
  }

  /* ===== Benefit ===== */
  .benefit-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 40px 36px;
    transition: all 0.2s;
  }
  .benefit-card:hover {
    border-color: var(--primary-light);
    transform: translateY(-3px);
    box-shadow: 0 24px 48px -20px rgba(14,165,233,0.28);
  }
  .benefit-icon {
    width: 72px; height: 72px;
    border-radius: 18px;
    background: var(--primary-pale);
    color: var(--primary-dark);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
  }
  .benefit-before-after {
    background: var(--bg-soft);
    border-radius: 14px;
    padding: 16px 20px;
    margin-top: 20px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-muted);
  }

  /* ===== Pillar ===== */
  .pillar-card {
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 44px 32px;
    background: white;
    transition: all 0.2s;
    text-align: center;
  }
  .pillar-card:hover { border-color: var(--primary-light); transform: translateY(-3px); }
  .pillar-num {
    font-size: 48px;
    font-weight: 900;
    color: var(--primary-light);
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .pillar-icon {
    width: 88px; height: 88px;
    border-radius: 22px;
    background: var(--primary-pale);
    color: var(--primary-dark);
    display: flex; align-items: center; justify-content: center;
    margin: 14px auto 22px;
  }

  /* ===== Problem ===== */
  .problem-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    position: relative;
  }
  .problem-card .h3-card {
    font-size: 24px;
    line-height: 1.6;
    white-space: nowrap;
  }
  .problem-card .body-text {
    white-space: normal;
  }
  .problem-persona {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--primary-pale);
    color: var(--primary-dark);
    font-size: 13px;
    font-weight: 900;
    padding: 8px 16px;
    border-radius: 999px;
    margin-bottom: 20px;
  }

  /* ===== Pricing ===== */
  .pricing-card {
    background: white;
    border: 2px solid var(--border);
    border-radius: 26px;
    padding: 44px 36px;
    transition: all 0.2s;
    position: relative;
  }
  .pricing-card.featured {
    border-color: var(--primary);
    background: var(--primary-ghost);
    box-shadow: 0 20px 48px -16px rgba(14,165,233,0.25);
  }
  .pricing-card.featured::before {
    content: "よく選ばれています";
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--primary);
    color: white;
    font-size: 13px;
    font-weight: 900;
    padding: 8px 22px;
    border-radius: 999px;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }
  .fixed-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--primary);
    color: white;
    font-size: 12px;
    font-weight: 900;
    padding: 6px 14px;
    border-radius: 999px;
    letter-spacing: 0.06em;
    margin-bottom: 12px;
  }
  .price-equal {
    font-size: 38px;
    font-weight: 900;
    color: var(--primary-dark);
    vertical-align: middle;
    margin-right: 4px;
  }
  .price-currency {
    font-size: 32px;
    font-weight: 900;
    color: var(--primary-dark);
  }
  .price-tax {
    font-size: 14px;
    font-weight: 800;
    color: var(--text-muted);
    margin-top: 8px;
  }
  .price-breakdown {
    display: inline-block;
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 800;
    color: var(--text-dark);
    margin-top: 14px;
  }

  /* ===== Before/After compare ===== */
  .compare-box {
    background: white;
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 32px;
  }
  .bar-wrap { display: flex; flex-direction: column; gap: 4px; }
  .bar-label {
    font-size: 13px;
    font-weight: 800;
    color: var(--text-muted);
    padding: 6px 0;
  }
  .bar-seg {
    padding: 14px 18px;
    font-size: 14px;
    font-weight: 800;
    color: white;
    border-radius: 6px;
  }
  .bar-total {
    background: var(--primary);
    padding: 20px 24px;
    border-radius: 10px;
    color: white;
    font-weight: 900;
    font-size: 22px;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 240px;
    line-height: 1.6;
  }

  /* ===== Scoreboard ===== */
  .score-card {
    background: white;
    border: 2px solid var(--border);
    border-radius: 22px;
    padding: 36px 20px;
    transition: all 0.2s;
  }
  .score-card.robokaru {
    border-color: var(--primary);
    background: var(--primary-ghost);
    box-shadow: 0 32px 64px -24px rgba(14,165,233,0.35);
    position: relative;
  }
  .score-card.robokaru::before {
    content: "★ 選ばれている理由";
    position: absolute;
    top: -16px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--primary);
    color: white;
    font-size: 12px;
    font-weight: 900;
    padding: 6px 18px;
    border-radius: 999px;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .score-head {
    text-align: center;
    font-size: 22px;
    font-weight: 900;
    color: var(--text-dark);
    padding-bottom: 18px;
    border-bottom: 1px dashed var(--border);
    margin-bottom: 18px;
  }
  .score-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px dashed var(--border);
  }
  .score-row:last-child { border-bottom: none; }
  .score-row-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    text-align: left;
  }
  .score-mark {
    font-size: 22px;
    font-weight: 900;
    line-height: 1;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .score-ok { color: var(--primary-dark); background: var(--primary-pale); }
  .score-mid { color: #94A3B8; background: #F1F5F9; }
  .score-ng { color: #CBD5E1; background: #F8FAFC; }
  .score-note {
    font-size: 13px;
    font-weight: 800;
    color: var(--text-muted);
    text-align: right;
    white-space: nowrap;
    overflow: visible;
  }

  /* ===== Flow ===== */
  .flow-step {
    background: white;
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 32px 20px 26px;
    text-align: center;
    position: relative;
    min-width: 0;
  }
  .flow-step h3 {
    font-size: clamp(18px, 1.5vw, 22px);
    word-break: keep-all;
    line-break: strict;
    overflow-wrap: break-word;
  }
  .flow-day {
    width: 84px; height: 84px;
    border-radius: 50%;
    background: var(--primary);
    color: white;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin: -72px auto 18px;
    box-shadow: 0 12px 28px -10px rgba(14,165,233,0.55);
  }
  .flow-day-num { font-size: 28px; font-weight: 900; line-height: 1; }
  .flow-day-lbl { font-size: 10px; font-weight: 900; letter-spacing: 0.1em; margin-top: 2px; }
  .flow-icon {
    width: 64px; height: 64px;
    border-radius: 16px;
    background: var(--primary-pale);
    color: var(--primary-dark);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
  }
  .flow-arrow { display: none; }
  @media (min-width: 1024px) {
    .flow-arrow { display: flex; align-items: center; justify-content: center; color: var(--primary-light); }
  }

  /* ===== FAQ ===== */
  .faq-item {
    background: white;
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px 32px;
    margin-bottom: 16px;
  }
  .faq-q {
    font-size: 19px;
    font-weight: 900;
    color: var(--text-dark);
    display: flex;
    gap: 14px;
    line-height: 1.5;
  }
  .faq-q-mark {
    color: var(--primary);
    font-weight: 900;
    font-size: 24px;
    flex-shrink: 0;
    line-height: 1;
  }
  .faq-a {
    font-size: 16px;
    line-height: 1.85;
    color: var(--text);
    margin-top: 14px;
    padding-left: 38px;
  }

  /* ===== CTA ===== */
  .cta-bg {
    background: linear-gradient(135deg, var(--primary-darker) 0%, var(--primary) 100%);
    position: relative;
    overflow: hidden;
  }
  .cta-bg::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 80% 20%, rgba(255,255,255,0.18) 0%, transparent 60%);
  }

  /* ===== Floating Side CTA (追従ボタン) ===== */
  .side-fab {
    position: fixed;
    right: 20px;
    bottom: 20px;
    z-index: 100;
    width: 220px;
    background: #FFFFE4;
    border: 1.5px solid #E8E2C4;
    border-radius: 16px;
    padding: 14px 12px 12px;
    box-shadow: 0 18px 36px -12px rgba(0,0,0,0.22);
    opacity: 0;
    visibility: hidden;
    transform: translateY(14px);
    transition: opacity 0.3s, transform 0.3s, visibility 0.3s;
  }
  .side-fab.visible {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
  }
  .side-fab .sf-title {
    font-size: 11px;
    font-weight: 800;
    color: #1F2A37;
    text-align: center;
    line-height: 1.5;
    margin: 0 0 10px;
    letter-spacing: 0.02em;
  }
  .side-fab a.sf-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    padding: 10px 10px;
    border-radius: 10px;
    margin-bottom: 8px;
    transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
  }
  .side-fab a.sf-btn:hover { transform: translateY(-1px); filter: brightness(1.05); }
  .side-fab a.sf-btn:last-of-type { margin-bottom: 0; }
  .side-fab .sf-tel { background: #DB3245; box-shadow: 0 6px 14px -6px rgba(219,50,69,0.5); }
  .side-fab .sf-tel .sf-num { font-size: 16px; font-weight: 900; color: white; line-height: 1.05; letter-spacing: 0.02em; }
  .side-fab .sf-tel .sf-sub { font-size: 9px; color: white; line-height: 1.3; opacity: 0.95; margin-top: 2px; }
  .side-fab .sf-mail { background: #EA7C14; justify-content: center; box-shadow: 0 6px 14px -6px rgba(234,124,20,0.5); }
  .side-fab .sf-mail p { font-size: 13px; font-weight: 900; color: white; line-height: 1.25; margin: 0; text-align: center; }
  .side-fab .sf-dl { background: #E4EDFA; border: 1.5px solid #1543AA; justify-content: center; box-shadow: 0 6px 14px -6px rgba(21,67,170,0.3); }
  .side-fab .sf-dl p { font-size: 13px; font-weight: 900; color: #1543AA; line-height: 1.25; margin: 0; text-align: center; }

    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #0EA5E9;
    color: white;

    text-decoration: none;

    border: none;
    transition: transform 0.15s, background 0.15s;

  .logo-marquee {

    overflow: hidden;
    padding: 28px 0;

  .logo-track {

    animation: logo-scroll 50s linear infinite;
    align-items: center;
  }
  .logo-marquee:hover .logo-track { animation-play-state: paused; }
  @keyframes logo-scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
